<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournament Details - MLBB OPS</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body {
      background-image:
        linear-gradient(to bottom, rgba(5,3,14,.85) 0%, rgba(5,3,14,.78) 40%, rgba(5,3,14,.92) 100%),
        url('assets/Teamsetup_page_wallpaper.png');
      background-size: cover; background-position: center top;
      background-attachment: fixed; background-repeat: no-repeat;
    }
    .details-wrap { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 5rem; }

    /* ── Hero poster ─────────────────────────── */
    .hero-poster {
      position: relative; width: 100%; min-height: 280px;
      display: flex; align-items: flex-end;
      overflow: hidden; border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      margin-bottom: 1.5rem;
    }
    .hero-poster-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    .hero-poster-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.25) 0%, rgba(5,3,14,.92) 100%);
    }
    .hero-poster-placeholder {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #0a1220 0%, #14203a 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-size: 100px;
      color: rgba(240,165,0,.08); letter-spacing: 4px;
    }
    .hero-content {
      position: relative; z-index: 1;
      padding: 2rem 2rem 1.75rem;
      width: 100%;
    }
    .hero-badges { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .hero-badge {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 4px 10px; border-radius: 4px; font-weight: 700;
    }
    .hero-badge.live     { background: rgba(239,68,68,.9); color:#fff; }
    .hero-badge.reg      { background: rgba(34,197,94,.85); color:#fff; }
    .hero-badge.upcoming { background: rgba(99,102,241,.85); color:#fff; }
    .hero-badge.done     { background: rgba(100,100,100,.8); color:#ddd; }
    .hero-badge.marhaen  { background: rgba(34,197,94,.85); color:#fff; }
    .hero-badge.jaguh    { background: rgba(59,130,246,.85); color:#fff; }
    .hero-badge.sultan   { background: rgba(234,179,8,.9);  color:#000; }
    .hero-title {
      font-family: var(--font-head); font-size: clamp(22px,4vw,38px);
      font-weight: 800; letter-spacing: 2px; color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,.7); margin: 0;
    }

    /* ── Info grid ───────────────────────────── */
    .info-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
      gap: 10px; margin-bottom: 1.25rem;
    }
    .info-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
    }
    .info-lbl {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--txt3); margin-bottom: 4px;
    }
    .info-val {
      font-family: var(--font-head); font-size: 15px; font-weight: 700;
      color: var(--txt); letter-spacing: .5px;
    }
    .info-val.gold  { color: var(--gold); }
    .info-val.green { color: var(--green); }
    .info-val.red   { color: var(--red); }

    /* ── Section cards ──────────────────────── */
    .section-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin-bottom: 1rem; overflow: hidden;
    }
    .section-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .section-icon {
      width: 34px; height: 34px; flex-shrink: 0; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      background: color-mix(in srgb, var(--gold) 12%, var(--bg3));
      border: 1px solid color-mix(in srgb, var(--gold) 25%, transparent);
    }
    .section-title {
      font-family: var(--font-head); font-size: 14px; letter-spacing: 1.2px;
      color: var(--txt); font-weight: 700;
    }
    .section-body { padding: 18px; }

    /* ── Stage format table ─────────────────── */
    .stage-table { width: 100%; border-collapse: collapse; }
    .stage-table th, .stage-table td {
      padding: 9px 12px; text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .stage-table th {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--txt3); background: var(--bg3);
    }
    .stage-table td { color: var(--txt2); }
    .stage-table td strong {
      font-family: var(--font-mono); color: var(--gold); font-size: 13px;
    }
    .stage-table tr:last-child td { border-bottom: none; }

    /* ── Prize breakdown ────────────────────── */
    .prize-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .prize-row:last-child { border-bottom: none; }
    .prize-place {
      font-family: var(--font-head); font-size: 18px; font-weight: 800;
      color: var(--txt3); min-width: 32px; text-align: center;
    }
    .prize-place.p1 { color: var(--gold); }
    .prize-place.p2 { color: #aaa; }
    .prize-place.p3 { color: #c87941; }
    .prize-name { flex: 1; font-size: 13px; color: var(--txt2); }
    .prize-amount { font-family: var(--font-mono); font-size: 15px; font-weight: 700; color: var(--gold); }

    /* ── Participant list ────────────────────── */
    .participant-grid { display: grid; gap: 8px; }
    .participant-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border: 1px solid var(--border);
      background: var(--bg3); border-radius: var(--radius);
    }
    .participant-tag {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px;
      color: var(--gold); font-weight: 700;
    }
    .participant-name { font-size: 13px; color: var(--txt2); flex: 1; }
    .participant-rank { font-size: 11px; color: var(--txt3); }

    /* ── Rules ──────────────────────────────── */
    .rules-body { font-size: 14px; color: var(--txt2); line-height: 1.75; white-space: pre-wrap; }

    /* ── Bracket ─────────────────────────────── */
    .bracket-card {
      position: relative;
      width: 100vw;
      left: 50%;
      transform: translateX(-50%);
      border-left: none;
      border-right: none;
      border-radius: 0;
      margin-bottom: 1.5rem;
    }
    .bracket-card .section-body { padding: 16px 0 22px; }
    .bracket-scroll { overflow-x: auto; overflow-y: hidden; padding: 0 24px 20px; cursor: grab; -webkit-overflow-scrolling: touch; touch-action: pan-y; user-select: none; min-height: 120px; }
    .bracket-scroll.is-dragging { cursor: grabbing; }
    .bracket-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
    .bracket-scroll::-webkit-scrollbar-track { background: transparent; }
    .bracket-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .bracket-scroll::-webkit-scrollbar-thumb:hover { background: var(--txt3); }
    /* bracket outer frame — isolates from wallpaper */
    .bracket-outer {
      background: rgba(7, 5, 20, 0.93);
      border: 1px solid rgba(100, 80, 200, 0.28);
      border-radius: 10px; padding: 14px 0 0;
      margin-bottom: 1rem; overflow: hidden;
    }
    .bracket-section { margin-bottom: 2.4rem; min-width: max-content; }
    .bracket-title { color: #a78bfa; font-size: 15px; margin-bottom: .8rem; font-family: var(--font-head); letter-spacing: 2px; text-transform: uppercase; padding: 0 20px; }
    .bracket-track { display: flex; align-items: flex-start; padding-top: 38px; width: max-content; }
    .round-col { position: relative; flex-shrink: 0; overflow: visible; }
    .round-label { position: absolute; top: -28px; left: 0; right: 0; text-align: center; font-size: 11px; font-weight: 700; color: rgba(200, 190, 255, 0.55); text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--font-mono); white-space: nowrap; }
    .bracket-track .match-card { position: absolute; left: 0; border: 1px solid rgba(255, 255, 255, 0.1); background: #0e0c22; border-radius: var(--radius); padding: 10px 14px; display: grid; gap: 6px; box-sizing: border-box; overflow: visible; align-content: center; transition: border-color .15s, box-shadow .15s, background .15s; }
    .bracket-track .match-card:hover { border-color: rgba(167, 139, 250, 0.45); }
    .bracket-track .match-card.current { background: #14103e; border-color: rgba(167, 139, 250, 0.7); box-shadow: 0 0 0 1px rgba(167, 139, 250, 0.15), 0 2px 10px rgba(0, 0, 0, 0.6); }
    .bracket-track .match-card.done { background: #090f0a; border-color: rgba(74, 222, 128, 0.3); }
    .bracket-track .match-card.waiting { background: #09081c; border-color: rgba(255, 255, 255, 0.05); }
    .team-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; color: rgba(220, 215, 255, 0.8); font-size: 13px; min-height: 26px; }
    .match-card.waiting .team-row { color: rgba(180, 170, 220, 0.28); }
    .team-row.winner { color: #fbbf24; font-weight: 700; }
    .team-row.loser  { color: rgba(255, 255, 255, 0.28); text-decoration: line-through; }
    .team-score { font-family: var(--font-mono); color: #fbbf24; font-size: 14px; font-weight: 700; min-width: 22px; text-align: right; }
    .bye, .tbd { color: rgba(200, 190, 255, 0.25); font-style: italic; }
    .bracket-conn { position: absolute; background: rgba(139, 92, 246, 0.45); pointer-events: none; border-radius: 1px; }
    .bracket-unified { min-width: max-content; }
    .bracket-subtitle { font-family: var(--font-head); font-size: 12px; font-weight: 900; color: #a78bfa; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid rgba(167, 139, 250, 0.28); line-height: 1.2; }
    .bracket-subtitle--gf { color: #fbbf24; border-bottom-color: rgba(251, 191, 36, 0.28); }
    .champion-box { border: 1px solid rgba(251, 191, 36, 0.5); border-radius: var(--radius); padding: 1rem 1.25rem; background: rgba(14, 12, 34, 0.95); color: #fbbf24; font-family: var(--font-head); letter-spacing: 1px; margin: .6rem 20px; font-size: 15px; }

    /* ── Application section ─────────────────── */
    .apply-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px; margin-bottom: 1rem;
    }
    .apply-status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 6px;
      font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .apply-status-badge.pending_review   { background: rgba(99,102,241,.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,.3); }
    .apply-status-badge.payment_submitted{ background: rgba(99,102,241,.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,.3); }
    .apply-status-badge.approved         { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .apply-status-badge.rejected         { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.25); }

    /* ── Loading ─────────────────────────────── */
    .details-loading { text-align: center; padding: 4rem; color: var(--txt3); }

    /* ── Nav ─────────────────────────────── */
    .home-nav {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in srgb, var(--bg) 94%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .home-nav-inner {
      max-width: 1280px; margin: 0 auto; padding: 14px 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: nowrap;
    }
    .home-links {
      display: flex; align-items: center; gap: 2px;
      flex-wrap: nowrap; list-style: none; flex: 1 1 auto; overflow: hidden;
    }
    .home-links a {
      display: inline-flex; align-items: center; min-height: 44px;
      padding: 9px 10px; border-radius: var(--radius);
      color: var(--txt2); font-family: var(--font-head); font-size: clamp(13px, 1.4vw, 17px);
      font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; white-space: nowrap;
      transition: all .2s;
    }
    .home-links a:hover, .home-links a.active { color: var(--gold); background: color-mix(in srgb, var(--gold) 12%, transparent); }
    .home-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    @media (max-width: 1024px) {
      .details-wrap { padding: 0 1.25rem 4rem; }
    }

    @media (max-width: 860px) {
      .info-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .home-nav-inner {
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        padding: 8px 1rem;
      }
      .navbar-logo { flex: 1 1 100%; justify-content: center; }
      .home-links  { flex-wrap: wrap; flex: 1 1 100%; overflow: visible; justify-content: center; }
      .home-actions { justify-content: center; width: 100%; }
      .home-links a { font-size: 13px; padding: 7px 8px; }

      .details-wrap { padding: 0 1rem 3rem; }
      .hero-poster  { min-height: 200px !important; }
      .hero-content { padding: 1.5rem 1rem 1.25rem; }
      .hero-title   { font-size: clamp(18px, 5vw, 28px); }

      /* Bracket must be horizontally scrollable */
      .bracket-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 12px;
      }
      .bracket-section { min-width: 600px; }

      .stage-table { font-size: 12px; }
      .stage-table th, .stage-table td { padding: 7px 10px; }

      .apply-card { padding: 16px; }
    }

    @media (max-width: 480px) {
      .home-nav-inner { padding: 6px .75rem; }
      .home-links a   { font-size: 11px; padding: 5px 6px; }
      .details-wrap   { padding: 0 .75rem 2.5rem; }

      .info-grid { grid-template-columns: repeat(2, 1fr); gap: 7px; }
      .info-card { padding: 10px 11px; }
      .info-lbl  { font-size: 8px; }
      .info-val  { font-size: 13px; }

      .hero-poster  { min-height: 160px !important; }
      .hero-content { padding: 1rem .85rem 1rem; }
      .hero-badges  { gap: 5px; margin-bottom: 7px; }

      .section-card { margin-bottom: .75rem; }
      .section-header { padding: 11px 14px; }
      .section-body   { padding: 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; }

      .apply-card { padding: 14px; }

      /* Bracket scroll — tight on mobile */
      .bracket-section { min-width: 520px; }
      .bracket-card .section-body { padding: 12px 0 16px; }
      .bracket-scroll { padding: 0 12px 14px; }
      .round-grid { grid-auto-columns: 170px; gap: 7px; }
      .bracket-track .match-card { padding: 6px 8px; }
      .team-row   { font-size: 11px; min-height: 22px; }
      .team-score { font-size: 11px; }

      .prize-row  { gap: 10px; padding: 8px 0; }
      .prize-place { font-size: 15px; min-width: 26px; }
      .prize-name  { font-size: 12px; }
      .prize-amount { font-size: 13px; }

      /* Stage table horizontal scroll */
      .stage-table { min-width: 260px; font-size: 12px; }
      .stage-table th, .stage-table td { padding: 7px 9px; }

      /* Participant chips compact */
      .participant-chip { padding: 8px 10px; gap: 7px; }
      .participant-name { font-size: 12px; }
      .participant-rank { font-size: 10px; }
      .participant-tag  { font-size: 10px; }

      /* Nav fix for mobile */
      .home-links { flex-wrap: wrap; flex: 1 1 100%; overflow: visible; justify-content: center; }
      .home-actions { justify-content: center; width: 100%; }
    }

    @media (max-width: 360px) {
      .info-grid { grid-template-columns: 1fr; }
      .info-val { font-size: 12px; }
      .home-links a { font-size: 10px; padding: 4px 5px; }
      .section-body { padding: 10px; }
    }

    /* ── Mobile hero ────────────────────────────── */
    @media (max-width: 640px) {
      .hero-poster  { min-height: 130px !important; }
      .hero-content { padding: 1rem 1rem .85rem; }
      .hero-title   { font-size: clamp(16px, 5vw, 22px); }
    }
    @media (max-width: 480px) {
      .hero-poster  { min-height: 100px !important; }
      .hero-content { padding: .85rem .85rem .75rem; }
    }

    /* ── Info grid — bigger touch targets ───────── */
    @media (max-width: 768px) {
      .info-card { padding: 14px; }
      .info-lbl  { font-size: 9px; margin-bottom: 5px; }
      .info-val  { font-size: 15px; }
    }

    /* ── Mobile bracket — round-by-round accordion ── */
    .desktop-bracket { display: block; }
    .mobile-bracket  { display: none; }

    .mbr-section { border-bottom: 1px solid var(--border); }
    .mbr-section:last-child { border-bottom: none; }

    .mbr-hdr {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; background: none; border: none; cursor: pointer;
      padding: 13px 18px; color: var(--txt2);
      font-family: var(--font-head); font-size: 12px; font-weight: 700;
      letter-spacing: 1.4px; text-transform: uppercase;
      transition: color .15s, background .15s;
    }
    .mbr-hdr:hover { background: rgba(168,85,247,.05); color: var(--gold); }
    .mbr-hdr.has-active { color: var(--txt); }

    .mbr-hdr-left { display: flex; align-items: center; gap: 7px; }
    .mbr-count {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--txt3); font-weight: 600; letter-spacing: 1px;
    }
    .mbr-live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: pulse-dot 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    .mbr-chevron {
      font-size: 11px; line-height: 1; flex-shrink: 0;
      color: var(--txt3);
      transition: transform .2s ease;
    }
    .mbr-section.open .mbr-chevron { transform: rotate(180deg); color: var(--gold); }

    .mbr-rounds { display: none; padding: 4px 14px 14px; }
    .mbr-section.open .mbr-rounds { display: block; }

    .mbr-round-group { margin-bottom: 12px; }
    .mbr-round-group:last-child { margin-bottom: 0; }
    .mbr-round-lbl {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--txt3);
      margin-bottom: 6px; padding: 0 2px;
    }
    .mbr-match {
      background: #0e0c22; border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius); padding: 10px 12px;
      margin-bottom: 6px; display: flex; flex-direction: column; gap: 5px;
      transition: border-color .15s;
    }
    .mbr-match:last-child { margin-bottom: 0; }
    .mbr-match.done   { background: rgba(6,20,10,.9); border-color: rgba(74,222,128,.18); }
    .mbr-match.active { background: #14103e; border-color: rgba(167,139,250,.55); box-shadow: 0 0 0 1px rgba(167,139,250,.1); }
    .mbr-match.waiting { opacity: .45; }

    .mbr-divider {
      height: 1px; background: rgba(255,255,255,.06); margin: 2px 0;
    }
    .mbr-team {
      display: flex; align-items: center; gap: 8px;
      min-height: 24px; font-size: 13px; color: rgba(220,215,255,.82);
    }
    .mbr-team.winner { color: #fbbf24; font-weight: 700; }
    .mbr-team.loser  { color: rgba(255,255,255,.26); text-decoration: line-through; }
    .mbr-team.tbd    { color: rgba(200,190,255,.22); font-style: italic; }

    .mbr-seed {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px;
      color: var(--txt3); flex-shrink: 0; min-width: 14px;
    }
    .mbr-tname {
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .mbr-score {
      font-family: var(--font-mono); font-size: 14px; font-weight: 700;
      color: #fbbf24; min-width: 20px; text-align: right; flex-shrink: 0;
    }
    .mbr-score.neutral { color: var(--txt3); font-weight: 400; font-size: 12px; }
    .mbr-status-tag {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px;
      padding: 2px 6px; border-radius: 3px; flex-shrink: 0; align-self: flex-start; margin-left: auto;
    }
    .mbr-status-tag.live    { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
    .mbr-status-tag.done    { background: rgba(74,222,128,.08); color: rgba(74,222,128,.7); border: 1px solid rgba(74,222,128,.2); }
    .mbr-status-tag.waiting { background: rgba(99,102,241,.1); color: #a5b4fc; border: 1px solid rgba(99,102,241,.2); }
    .mbr-walkover-note {
      font-family: var(--font-mono); font-size: 9px; color: var(--txt3);
      letter-spacing: 1px; padding: 3px 0 0;
    }

    .mbr-bracket-lbl {
      font-family: var(--font-head); font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 18px 4px; color: var(--txt3);
    }
    .mbr-bracket-lbl.wb { color: color-mix(in srgb, var(--gold) 60%, var(--txt3)); }
    .mbr-bracket-lbl.lb { color: color-mix(in srgb, var(--blue2) 60%, var(--txt3)); }
    .mbr-bracket-lbl.gf { color: #fbbf24; }

    @media (max-width: 640px) {
      .desktop-bracket { display: none; }
      .mobile-bracket  { display: block; }
    }
  </style>
</head>
<body>
  <!-- Mobile nav drawer -->
  <div class="nav-drawer" id="navDrawer">
    <div class="nav-drawer-panel">

  <script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import { formatDate, formatPrize } from "./js/utils.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { ref, get, set, update, push } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
    import { initAdminNavBadge } from "./js/admin-nav-badge.js";

    const params = new URLSearchParams(location.search);
    const tournamentId = params.get("id");
    const root = document.getElementById("detailsRoot");

    let currentUser = null;
    let currentUserRole = "guest";
    let currentTeam = null;
    let tournament = null;
    const teamNameCache = {};

    // ── Auth state ──────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      const navActions = document.getElementById("navActions");
      const adminNavItems = document.querySelectorAll(".admin-nav");
      const playerNavItems = document.querySelectorAll(".player-nav");
      currentUser = user;

      if (!user) {
        adminNavItems.forEach(n => n.classList.add("hidden"));
        navActions.innerHTML = `<a class="btn btn-secondary btn-sm" href="login.html">Login</a><a class="btn btn-primary btn-sm" href="register.html">Sign Up</a>`;
        navActions.style.visibility = "visible";
        currentUserRole = "guest";
      } else {
        const roleSnap = await get(ref(db, `users/${user.uid}/role`));
        currentUserRole = roleSnap.exists() ? roleSnap.val() : "player";
        adminNavItems.forEach(n => n.classList.toggle("hidden", currentUserRole !== "organizer"));
        playerNavItems.forEach(n => n.classList.toggle("hidden", currentUserRole === "organizer"));
        navActions.innerHTML = `<span class="btn btn-primary btn-sm" style="cursor:default;pointer-events:none">${currentUserRole === "organizer" ? "Admin" : "Player"}</span><button class="btn btn-secondary btn-sm" id="logoutBtn">Log Keluar</button>`;
        navActions.style.visibility = "visible";
        document.getElementById("logoutBtn").addEventListener("click", async () => {
          await signOut(auth); window.location.href = "login.html";
        });
        // Start global nav badge for organizers
        if (currentUserRole === "organizer") initAdminNavBadge(db);
        // Load player's team
        if (currentUserRole === "player") {
          const tSnap = await get(ref(db, `teams/${user.uid}`));
          currentTeam = tSnap.exists() ? tSnap.val() : null;
        }
      }
      // Re-render apply section after auth resolves
      renderApplySection();
    });

    // ── Helpers ─────────────────────────────────────────────
    function escHtml(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function getTeamName(uid) {
      if (!uid || uid === '__BYE__') return 'BYE';
      if (teamNameCache[uid]) return teamNameCache[uid];
      const snap = await get(ref(db, `teams/${uid}/teamName`));
      teamNameCache[uid] = snap.exists() ? snap.val() : "Pasukan Tidak Dikenali";
      return teamNameCache[uid];
    }

    function stageFormatsHtml(sf, format) {
      if (!sf) return '<p class="text-muted" style="font-size:13px">Format tidak ditetapkan</p>';
      const rows = format === "single"
        ? [
            ["Pusingan Awal",    sf.earlyRounds   || "BO1"],
            ["Quarter Final",    sf.quarterFinal  || "BO1"],
            ["Semi Final",       sf.semiFinal     || "BO1"],
            ["Grand Final",      sf.grandFinal    || "BO5"],
          ]
        : [
            ["Upper Bracket",        sf.upperBracket       || "BO1"],
            ["Upper Bracket Final",  sf.upperBracketFinal  || "BO3"],
            ["Lower Bracket",        sf.lowerBracket       || "BO1"],
            ["Lower Bracket Final",  sf.lowerBracketFinal  || "BO3"],
            ["Grand Final",          sf.grandFinal         || "BO5"],
          ];
      return `<table class="stage-table">
        <thead><tr><th>Peringkat</th><th>Format</th></tr></thead>
        <tbody>
          ${rows.map(([stage, fmt]) =>
            `<tr><td>${stage}</td><td><strong>${fmt.toUpperCase()}</strong></td></tr>`
          ).join("")}
        </tbody>
      </table>`;
    }

    // ── Bracket rendering ────────────────────────────────────
    function renderTeamRow(uid, score, match) {
      const isBye   = !uid || uid === '__BYE__';
      const label   = isBye ? "BYE" : (teamNameCache[uid] || "TBD");
      const state   = (!isBye && match.winnerId === uid) ? "winner" : (!isBye && match.loserId === uid) ? "loser" : "";
      const muted   = isBye ? "bye" : !uid ? "tbd" : "";
      return `<div class="team-row ${state} ${muted}"><span>${escHtml(label)}</span><span class="team-score">${isBye ? "" : Number(score)||0}</span></div>`;
    }

    // ── Bracket rendering ────────────────────────────────────
    function renderBracketSection(title, matches, bracket) {
      const CARD_H = 72;
      const CARD_W = 300;
      const CONN_W = 64;
      const R1_GAP = 18;

      const grouped = {};
      Object.values(matches || {})
        .filter(m => m.bracket === bracket && m.status !== 'bye' && m.status !== 'skip')
        .sort((a,b) => a.round - b.round || a.position - b.position)
        .forEach(m => { grouped[m.round] ||= []; grouped[m.round].push(m); });
      const rounds = Object.keys(grouped).map(Number).sort((a,b) => a-b);
      if (!rounds.length) return "";

      const topsByRound = {};
      rounds.forEach((r, ri) => {
        const cur = grouped[r];
        if (ri === 0) {
          topsByRound[r] = cur.map((_, i) => i * (CARD_H + R1_GAP));
          return;
        }
        const prev     = grouped[rounds[ri - 1]];
        const prevTops = topsByRound[rounds[ri - 1]];
        topsByRound[r] = cur.map((_, i) => {
          if (prev.length === 2 * cur.length) {
            const t0 = prevTops[i * 2]     ?? prevTops[0];
            const t1 = prevTops[i * 2 + 1] ?? prevTops[prevTops.length - 1];
            return (t0 + t1) / 2;
          }
          return prevTops[i] ?? i * (CARD_H + R1_GAP);
        });
      });

      const maxHeight = Math.max(...rounds.map(r => {
        const tops = topsByRound[r];
        return (tops[tops.length - 1] || 0) + CARD_H;
      }));

      const cols = rounds.map((r, ri) => {
        const cur       = grouped[r];
        const tops      = topsByRound[r];
        const isFirst   = ri === 0;
        const isLast    = ri === rounds.length - 1;
        const nextLen   = isLast ? 0 : grouped[rounds[ri + 1]].length;
        const branching = !isLast && cur.length === 2 * nextLen;

        const cards = cur.map((m, i) => {
          const top  = tops[i];
          const midY = Math.round(CARD_H / 2) - 1;
          let conns = "";
          if (!isFirst) {
            conns += `<div class="bracket-conn" style="right:100%;top:${midY}px;width:${CONN_W}px;height:3px;"></div>`;
          }
          if (!isLast) {
            conns += `<div class="bracket-conn" style="left:100%;top:${midY}px;width:${CONN_W}px;height:3px;"></div>`;
            if (branching && i % 2 === 0 && i + 1 < tops.length) {
              const vH = tops[i + 1] - tops[i];
              conns += `<div class="bracket-conn" style="left:calc(100% + ${CONN_W - 1}px);top:${midY - 1}px;width:3px;height:${vH + 2}px;"></div>`;
            }
          }
          const isDone   = m.status === "done" || m.status === "walkover";
          const isActive = m.status === "upcoming" || m.status === "pending" || m.status === "live";
          const cardCls  = isDone ? "done" : isActive ? "current" : "waiting";
          return `<div class="match-card ${cardCls}" style="top:${top}px;width:${CARD_W}px;height:${CARD_H}px;">
            ${renderTeamRow(m.team1, m.score1, m)}
            ${renderTeamRow(m.team2, m.score2, m)}
            ${conns}
          </div>`;
        });

        return `<div class="round-col" style="width:${CARD_W}px;height:${maxHeight}px;${isLast ? "" : `margin-right:${CONN_W * 2}px;`}">
          <div class="round-label">Round ${r}</div>
          ${cards.join("")}
        </div>`;
      });

      return `<div class="bracket-section">
        <h3 class="bracket-title">${title}</h3>
        <div class="bracket-track">
          ${cols.join("")}
        </div>
      </div>`;
    }

    function renderBracketDouble(matches, winnerId) {
      const CARD_H   = 72;
      const CARD_W   = 300;
      const CONN_W   = 64;
      const R1_GAP   = 18;
      const TRACK_PT = 28;
      const TITLE_H  = 16;
      const TITLE_MB = 6;
      const ROW_GAP  = 36;
      const PAD_TOP  = 12;

      function computeLayout(bracket) {
        const grouped = {};
        Object.values(matches || {})
          .filter(m => m.bracket === bracket)
          .sort((a,b) => a.round - b.round || a.position - b.position)
          .forEach(m => { grouped[m.round] ||= []; grouped[m.round].push(m); });
        const rounds = Object.keys(grouped).map(Number).sort((a,b) => a-b);
        if (!rounds.length) return null;

        const topsByRound = {};
        rounds.forEach((r, ri) => {
          const cur = grouped[r];
          if (ri === 0) {
            topsByRound[r] = cur.map((_, i) => i * (CARD_H + R1_GAP));
            return;
          }
          const prev     = grouped[rounds[ri - 1]];
          const prevTops = topsByRound[rounds[ri - 1]];
          topsByRound[r] = cur.map((_, i) => {
            if (prev.length === 2 * cur.length) {
              const t0 = prevTops[i * 2]     ?? prevTops[0];
              const t1 = prevTops[i * 2 + 1] ?? prevTops[prevTops.length - 1];
              return (t0 + t1) / 2;
            }
            return prevTops[i] ?? i * (CARD_H + R1_GAP);
          });
        });

        const maxHeight = Math.max(...rounds.map(r => {
          const tops = topsByRound[r];
          return (tops[tops.length - 1] || 0) + CARD_H;
        }));

        const trackWidth = rounds.reduce((w, _r, ri) => {
          return w + CARD_W + (ri < rounds.length - 1 ? CONN_W * 2 : 0);
        }, 0);

        const lastRound = rounds[rounds.length - 1];
        const lastTops  = topsByRound[lastRound];
        const finalMidY = lastTops[lastTops.length - 1] + CARD_H / 2;

        return { grouped, rounds, topsByRound, maxHeight, trackWidth, finalMidY };
      }

      function renderMatchCols(layout, opts = {}) {
        const { grouped, rounds, topsByRound, maxHeight } = layout;
        const { hasLeftStub = false, labelFn = r => `Round ${r}` } = opts;

        return rounds.map((r, ri) => {
          const cur      = grouped[r];
          const tops     = topsByRound[r];
          const isFirst  = ri === 0;
          const isLast   = ri === rounds.length - 1;
          const nextLen  = isLast ? 0 : grouped[rounds[ri + 1]].length;
          const branching = !isLast && cur.length === 2 * nextLen;

          const cards = cur.map((m, i) => {
            const top  = tops[i];
            const midY = Math.round(CARD_H / 2) - 1;
            let conns = "";

            if (!isFirst || hasLeftStub) {
              conns += `<div class="bracket-conn" style="right:100%;top:${midY}px;width:${CONN_W}px;height:3px;"></div>`;
            }
            if (!isLast) {
              conns += `<div class="bracket-conn" style="left:100%;top:${midY}px;width:${CONN_W}px;height:3px;"></div>`;
              if (branching && i % 2 === 0 && i + 1 < tops.length) {
                const vH = tops[i + 1] - tops[i];
                conns += `<div class="bracket-conn" style="left:calc(100% + ${CONN_W - 1}px);top:${midY - 1}px;width:3px;height:${vH + 2}px;"></div>`;
              }
            }

            const isDone   = m.status === "done" || m.status === "walkover";
            const isActive = m.status === "upcoming" || m.status === "pending" || m.status === "live";
            const cardCls  = isDone ? "done" : isActive ? "current" : "waiting";
            return `<div class="match-card ${cardCls}" style="top:${top}px;width:${CARD_W}px;height:${CARD_H}px;">
              ${renderTeamRow(m.team1, m.score1, m)}
              ${renderTeamRow(m.team2, m.score2, m)}
              ${conns}
            </div>`;
          });

          return `<div class="round-col" style="width:${CARD_W}px;height:${maxHeight}px;${isLast ? "" : `margin-right:${CONN_W * 2}px;`}">
            <div class="round-label">${labelFn(r)}</div>
            ${cards.join("")}
          </div>`;
        }).join("");
      }

      const wb = computeLayout("wb");
      const lb = computeLayout("lb");
      const gf = computeLayout("gf");

      if (!wb) return '<p class="text-muted">Bracket belum dijana.</p>';

      const titleBlock     = TITLE_H + TITLE_MB;
      const wbTop          = PAD_TOP;
      const wbTrackStart   = wbTop + titleBlock + TRACK_PT;
      const wbFinalAbsMidY = wb ? (wbTrackStart + wb.finalMidY) : 0;
      const wbSectionH     = titleBlock + TRACK_PT + (wb?.maxHeight || 0);

      const lbTop          = wbTop + wbSectionH + ROW_GAP;
      const lbTrackStart   = lbTop + titleBlock + TRACK_PT;
      const lbFinalAbsMidY = lb ? (lbTrackStart + lb.finalMidY) : wbFinalAbsMidY;

      const gfCardAbsMidY   = lb ? Math.round((wbFinalAbsMidY + lbFinalAbsMidY) / 2) : wbFinalAbsMidY;
      const gfFirstCardMidY = gf ? ((gf.topsByRound[gf.rounds[0]][0] || 0) + CARD_H / 2) : CARD_H / 2;
      const gfTrackContentY = gfCardAbsMidY - gfFirstCardMidY;
      const gfTop           = Math.max(PAD_TOP, gfTrackContentY - TRACK_PT - titleBlock);

      const mainW  = Math.max(wb?.trackWidth || 0, lb?.trackWidth || 0);
      const railX  = mainW + CONN_W;
      const gfLeft = mainW + CONN_W * 2;

      const connectors = [];
      if (wb && gf) {
        connectors.push(`<div class="bracket-conn" style="position:absolute;left:${wb.trackWidth}px;top:${Math.round(wbFinalAbsMidY) - 1}px;width:${railX - wb.trackWidth}px;height:3px;"></div>`);
      }
      if (lb && gf) {
        connectors.push(`<div class="bracket-conn" style="position:absolute;left:${lb.trackWidth}px;top:${Math.round(lbFinalAbsMidY) - 1}px;width:${railX - lb.trackWidth}px;height:3px;"></div>`);
        const vTop = Math.min(wbFinalAbsMidY, lbFinalAbsMidY);
        const vH   = Math.abs(lbFinalAbsMidY - wbFinalAbsMidY);
        connectors.push(`<div class="bracket-conn" style="position:absolute;left:${railX - 1}px;top:${Math.round(vTop)}px;width:3px;height:${Math.round(vH)}px;"></div>`);
      }

      const lbBottom = lb ? (lbTop + titleBlock + TRACK_PT + lb.maxHeight) : 0;
      const gfBottom = gf ? (gfTop + titleBlock + TRACK_PT + gf.maxHeight) : 0;
      const totalH   = Math.max(wbTop + wbSectionH, lbBottom, gfBottom) + 24;
      const totalW   = gfLeft + (gf?.trackWidth || CARD_W) + 24;

      const champion = `<div class="champion-box">🏆 Champion: ${winnerId ? escHtml(teamNameCache[winnerId]||"—") : "Belum ditentukan"}</div>`;

      const wbLabelFn = r => {
        if (r === wb.rounds[wb.rounds.length - 1]) return "UB Final";
        return `Round ${r}`;
      };
      const lbLabelFn = lb ? r => {
        if (r === lb.rounds[lb.rounds.length - 1]) return "LB Final";
        if (r === lb.rounds[lb.rounds.length - 2]) return "LB Semi-Final";
        return `Round ${r}`;
      } : null;

      return `<div class="bracket-outer">
      <div class="bracket-scroll">
        <div class="bracket-unified" style="position:relative;height:${totalH}px;width:${totalW}px;">
          ${wb ? `<div style="position:absolute;top:${wbTop}px;left:0;">
            <div class="bracket-subtitle">Upper Bracket</div>
            <div class="bracket-track">${renderMatchCols(wb, { labelFn: wbLabelFn })}</div>
          </div>` : ""}
          ${lb ? `<div style="position:absolute;top:${lbTop}px;left:0;">
            <div class="bracket-subtitle">Lower Bracket</div>
            <div class="bracket-track">${renderMatchCols(lb, { labelFn: lbLabelFn })}</div>
          </div>` : ""}
          ${connectors.join("")}
          ${gf ? `<div style="position:absolute;top:${gfTop}px;left:${gfLeft}px;">
            <div class="bracket-subtitle bracket-subtitle--gf">Grand Final</div>
            <div class="bracket-track">${renderMatchCols(gf, { hasLeftStub: true, labelFn: () => "Grand Final" })}</div>
          </div>` : ""}
        </div>
      </div>
      ${champion}
      </div>`;
    }

    function renderBracketMobile(matches) {
      const allMatches = Object.values(matches || {});
      if (!allMatches.length) return '<p class="text-muted" style="padding:1rem 18px">Bracket belum dijana.</p>';

      const bOrder = { wb: 0, lb: 1, gf: 2 };
      const sortedMatches = [...allMatches].filter(m => m.status !== 'bye' && m.status !== 'skip').sort((a, b) => {
        const ba = bOrder[a.bracket] ?? 3, bb = bOrder[b.bracket] ?? 3;
        if (ba !== bb) return ba - bb;
        return a.round - b.round || a.position - b.position;
      });

      // Group: bracket → round → [matches]
      const groups = {};
      sortedMatches.forEach(m => {
        (groups[m.bracket] ??= {})[m.round] ??= [];
        groups[m.bracket][m.round].push(m);
      });

      const brackets = Object.keys(groups).sort((a,b)=>(bOrder[a]??3)-(bOrder[b]??3));
      const bracketMeta = { wb:'Upper Bracket', lb:'Lower Bracket', gf:'Grand Final' };
      const bracketCls  = { wb:'wb', lb:'lb', gf:'gf' };

      function roundLabel(br, round, rounds) {
        const last = rounds[rounds.length-1], prev = rounds[rounds.length-2];
        if (br==='gf') return 'Grand Final';
        if (br==='wb' && round===last) return 'UB Final';
        if (br==='lb' && round===last) return 'LB Final';
        if (br==='lb' && round===prev) return 'LB Semi-Final';
        return `Round ${round}`;
      }

      function teamRow(uid, score, m, idx) {
        const isByeSlot = !uid || uid === '__BYE__';
        const isWinner = !isByeSlot && m.winnerId === uid;
        const isLoser  = !isByeSlot && m.loserId  === uid;
        const label    = isByeSlot ? 'BYE' : (teamNameCache[uid] || 'TBD');
        const cls      = isByeSlot ? 'tbd' : isWinner ? 'winner' : isLoser ? 'loser' : '';
        const scoreHtml = uid
          ? `<span class="mbr-score${!isWinner&&!isLoser?' neutral':''}">${Number(score)||0}</span>`
          : '';
        return `<div class="mbr-team ${cls}">
          <span class="mbr-seed">${idx+1}</span>
          <span class="mbr-tname">${escHtml(label)}</span>
          ${scoreHtml}
        </div>`;
      }

      function matchCls(m) {
        if (m.status==='done'||m.status==='walkover') return 'done';
        if (m.status==='upcoming'||m.status==='live'||m.status==='pending') return 'active';
        return 'waiting';
      }
      function statusTag(m) {
        if (m.status==='live') return '<span class="mbr-status-tag live">LIVE</span>';
        if (m.status==='done'||m.status==='walkover') return '<span class="mbr-status-tag done">SELESAI</span>';
        if (m.status==='upcoming') return '<span class="mbr-status-tag waiting">AKAN DATANG</span>';
        return '';
      }

      // Find first bracket+round with active matches
      let activeBr = null;
      outer: for (const br of brackets) {
        for (const round of Object.keys(groups[br]).map(Number).sort((a,b)=>a-b)) {
          if (groups[br][round].some(m=>m.status==='upcoming'||m.status==='live'||m.status==='pending')) {
            activeBr = br; break outer;
          }
        }
      }

      const html = brackets.map(br => {
        const roundNums = Object.keys(groups[br]).map(Number).sort((a,b)=>a-b);
        const totalM    = roundNums.reduce((n,r)=>n+groups[br][r].length, 0);
        const hasActive = roundNums.some(r => groups[br][r].some(m=>m.status==='upcoming'||m.status==='live'||m.status==='pending'));
        const isOpen    = br === (activeBr ?? brackets[0]);

        const roundsHtml = roundNums.map(round => {
          const lbl = roundLabel(br, round, roundNums);
          const matchesHtml = groups[br][round].map(m =>
            `<div class="mbr-match ${matchCls(m)}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px">
                <div style="flex:1">${teamRow(m.team1,m.score1,m,0)}<div class="mbr-divider"></div>${teamRow(m.team2,m.score2,m,1)}</div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">${statusTag(m)}</div>
              </div>
              ${m.status==='walkover'?'<div class="mbr-walkover-note">WALKOVER</div>':''}
            </div>`
          ).join('');
          return `<div class="mbr-round-group">
            <div class="mbr-round-lbl">${lbl}</div>
            ${matchesHtml}
          </div>`;
        }).join('');

        return `<div class="mbr-section${isOpen?' open':''}">
          <button class="mbr-hdr${hasActive?' has-active':''}" data-mbr-toggle>
            <div class="mbr-hdr-left">
              ${hasActive?'<span class="mbr-live-dot"></span>':''}
              <span>${escHtml(bracketMeta[br]||br.toUpperCase())}</span>
              <span class="mbr-count">${totalM} perlawanan</span>
            </div>
            <span class="mbr-chevron">▾</span>
          </button>
          <div class="mbr-rounds">${roundsHtml}</div>
        </div>`;
      }).join('');

      return `<div>${html}</div>`;
    }

    async function renderBracket(matches, format, winnerId) {
      const allUids = new Set();
      Object.values(matches||{}).forEach(m => {
        if (m.team1) allUids.add(m.team1);
        if (m.team2) allUids.add(m.team2);
        if (m.winnerId) allUids.add(m.winnerId);
      });
      await Promise.all([...allUids].filter(u => u && u !== '__BYE__' && !teamNameCache[u]).map(async u => {
        teamNameCache[u] = await getTeamName(u);
      }));

      const allMatches = Object.values(matches||{});
      const empty = '<p class="text-muted">Bracket belum dijana.</p>';
      if (!allMatches.length) return `<div class="desktop-bracket">${empty}</div><div class="mobile-bracket">${empty}</div>`;

      const championHtml = `<div class="champion-box" style="margin:.6rem 0 0">🏆 Champion: ${winnerId ? escHtml(teamNameCache[winnerId]||"—") : "Belum ditentukan"}</div>`;
      const mobileHtml = `<div class="mobile-bracket">${renderBracketMobile(matches)}${championHtml}</div>`;

      if (format === "double") {
        return `<div class="desktop-bracket">${renderBracketDouble(matches, winnerId)}</div>${mobileHtml}`;
      }

      const desktopHtml = `<div class="desktop-bracket">
        <div class="bracket-scroll">${renderBracketSection("Upper Bracket", matches, "wb")}</div>
        ${championHtml}
      </div>`;
      return desktopHtml + mobileHtml;
    }

    // ── Application section ──────────────────────────────────
    let existingApplication = null;

    async function loadApplication() {
      if (!currentUser || !tournamentId) return;
      const snap = await get(ref(db, `applications/${tournamentId}/${currentUser.uid}`));
      existingApplication = snap.exists() ? snap.val() : null;
    }

    const STATUS_LABELS = {
      pending_review:    "⏳ Menunggu Semakan",
      payment_submitted: "⏳ Menunggu Semakan",   // backward compat
      approved:          "✅ Diluluskan",
      rejected:          "❌ Ditolak",
    };

    function renderApplySection() {
      const el = document.getElementById("applySection");
      if (!el || !tournament) return;

      const t = tournament;
      const isFull = (t.teamCount||0) >= (t.maxTeams||1);
      const isOpen = t.status === "registration";

      // Guest
      if (!currentUser) {
        el.innerHTML = `<div class="apply-card">
          <h3 style="margin-bottom:10px">Sertai Tournament</h3>
          <p style="color:var(--txt2);font-size:14px;margin-bottom:14px">Log masuk untuk mendaftar pasukan anda dalam tournament ini.</p>
          <a class="btn btn-primary" href="login.html">Log Masuk</a>
        </div>`;
        return;
      }

      // Admin view
      if (currentUserRole === "organizer") {
        el.innerHTML = `<div class="apply-card" style="background:rgba(240,165,0,.05);border-color:rgba(240,165,0,.2)">
          <p style="font-family:var(--font-mono);font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase">Admin View</p>
          <p style="color:var(--txt2);font-size:13px;margin-top:6px">Urus pendaftaran pasukan dalam <a href="organizer.html" style="color:var(--gold)">Organizer Dashboard</a></p>
        </div>`;
        return;
      }

      // Player — no team registered
      if (!currentTeam) {
        el.innerHTML = `<div class="apply-card">
          <h3 style="margin-bottom:10px">Daftar Masuk Tournament</h3>
          <p style="color:var(--txt2);font-size:14px;margin-bottom:14px">Anda perlu mendaftarkan pasukan terlebih dahulu sebelum boleh menyertai tournament.</p>
          <a class="btn btn-primary" href="team-setup.html">Daftar Pasukan →</a>
        </div>`;
        return;
      }

      // Already has application
      if (existingApplication) {
        const statusKey = existingApplication.status || "pending_review";
        const statusLbl = STATUS_LABELS[statusKey] || statusKey;
        el.innerHTML = `<div class="apply-card">
          <h3 style="margin-bottom:12px">Status Permohonan Anda</h3>
          <div class="apply-status-badge ${statusKey}">${statusLbl}</div>
          <div style="margin-top:12px;font-size:13px;color:var(--txt2)">
            <p><strong>Pasukan:</strong> [${escHtml(currentTeam.teamTag||"")}] ${escHtml(currentTeam.teamName||"")}</p>
            <p style="margin-top:6px"><strong>Didaftar:</strong> ${formatDate(existingApplication.appliedAt)}</p>
            ${existingApplication.status==="rejected" && existingApplication.rejectionReason
              ? `<p style="margin-top:8px;color:var(--red)"><strong>Sebab Tolak:</strong> ${escHtml(existingApplication.rejectionReason)}</p>`
              : ""}
          </div>
        </div>`;
        return;
      }

      // Tournament closed / full
      if (!isOpen) {
        el.innerHTML = `<div class="apply-card">
          <p style="color:var(--txt3);font-size:14px">Pendaftaran untuk tournament ini telah ditutup.</p>
        </div>`;
        return;
      }
      if (isFull) {
        el.innerHTML = `<div class="apply-card">
          <p style="color:var(--red);font-size:14px">Slot tournament telah penuh. Tiada tempat tersedia.</p>
        </div>`;
        return;
      }

      // Show apply form
      const hasFee = (t.entryFee || 0) > 0;
      el.innerHTML = `<div class="apply-card">
        <h3 style="margin-bottom:6px">Daftar Masuk Tournament</h3>
        <p style="color:var(--txt2);font-size:13px;margin-bottom:16px">Pasukan anda: <strong>[${escHtml(currentTeam.teamTag||"")}] ${escHtml(currentTeam.teamName||"")}</strong></p>

        ${hasFee ? `
        <div style="background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.25);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px">
          <p style="font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px">💳 Yuran Penyertaan</p>
          <p style="font-size:14px;font-weight:700;color:var(--txt);">${formatPrize(t.entryFee)}</p>
          <p style="font-size:12px;color:var(--txt3);margin-top:4px">Bayaran akan disahkan oleh penganjur melalui WhatsApp. Hantarkan permohonan terlebih dahulu.</p>
        </div>` : ""}

        <div id="applyAlertError" class="alert alert-error" style="display:none"></div>
        <button class="btn btn-primary btn-full" id="btnApply" style="margin-top:8px">
          📝 Hantar Permohonan
        </button>
      </div>`;

      // Submit handler
      document.getElementById("btnApply").addEventListener("click", async () => {
        const errEl = document.getElementById("applyAlertError");
        errEl.style.display = "none";

        const btn = document.getElementById("btnApply");
        const origHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Menghantar...';

        try {
          const applicationData = {
            teamUid:         currentUser.uid,
            tournamentId,
            teamName:        currentTeam.teamName    || "",
            teamTag:         currentTeam.teamTag     || "",
            captainName:     currentTeam.displayName || "",
            captainRank:     currentTeam.captainRank || "",
            captainUid:      currentUser.uid,
            status:          "pending_review",
            appliedAt:       Date.now(),
            reviewedAt:      null,
            reviewedBy:      null,
            rejectionReason: null,
          };

          await set(ref(db, `applications/${tournamentId}/${currentUser.uid}`), applicationData);
          existingApplication = applicationData;
          renderApplySection(); // refresh
        } catch (err) {
          const errEl = document.getElementById("applyAlertError");
          if (errEl) { errEl.textContent = "Ralat menghantar permohonan. Cuba lagi."; errEl.style.display = "block"; }
          btn.disabled = false;
          btn.innerHTML = origHtml;
        }
      });
    }

    // ── Main render ──────────────────────────────────────────
    async function render() {
      if (!tournamentId) {
        try {
          const aSnap = await get(ref(db, "tournaments"));
          if (aSnap.exists()) {
            const active = Object.entries(aSnap.val())
              .map(([id, t]) => ({ id, ...t }))
              .filter(t => t.status === "live" || t.status === "registration")
              .sort((a, b) => (a.status === "live" ? 0 : 1) - (b.status === "live" ? 0 : 1));
            if (active.length) {
              window.location.replace(`tournament-details?id=${encodeURIComponent(active[0].id)}`);
              return;
            }
          }
        } catch {}
        root.innerHTML = '<div class="section-card"><div class="section-body empty-state">Tiada tournament aktif.</div></div>';
        return;
      }

      const snap = await get(ref(db, `tournaments/${tournamentId}`));
      if (!snap.exists()) {
        root.innerHTML = '<div class="section-card"><div class="section-body empty-state">Tournament tidak wujud.</div></div>';
        return;
      }
      tournament = snap.val();
      const t = tournament;

      // Load application for current user
      await loadApplication();

      const isFull = (t.teamCount||0) >= (t.maxTeams||1);
      const statusMap = {
        live: ['live','🔴 LIVE'],
        registration: ['reg','BUKA PENDAFTARAN'],
        upcoming: ['upcoming','AKAN DATANG'],
        done: ['done','SELESAI'],
      };
      const [statusCls, statusLbl] = statusMap[t.status] || ['upcoming', t.status||""];

      // Pre-load approved participants
      const approvedTeams = Object.entries(t.teams||{});
      if (approvedTeams.length) {
        await Promise.all(approvedTeams.map(([uid]) => getTeamName(uid)));
      }

      const bracketHtml = await renderBracket(t.matches, t.format, t.winnerId);

      root.innerHTML = `
      <!-- Hero poster -->
      <div class="hero-poster" style="min-height:${t.posterUrl ? '360px' : '200px'}">
        ${t.posterUrl
          ? `<img class="hero-poster-img" src="${escHtml(t.posterUrl)}" alt="${escHtml(t.name)}" onerror="this.style.display='none'">`
          : `<div class="hero-poster-placeholder">${escHtml((t.name||"?")[0])}</div>`
        }
        <div class="hero-poster-gradient"></div>
        <div class="hero-content">
          <div class="hero-badges">
            <span class="hero-badge ${statusCls}">${statusLbl}</span>
            <span class="hero-badge ${t.category||"marhaen"}">${(t.category||"").toUpperCase()}</span>
          </div>
          <h1 class="hero-title">${escHtml(t.name)}</h1>
        </div>
      </div>

      <!-- Back link -->
      <div style="margin-bottom:1rem">
        <a href="schedule.html" style="font-family:var(--font-mono);font-size:12px;letter-spacing:1px;color:var(--txt3)">← Kembali ke Tournaments</a>
      </div>

      <!-- Key info grid -->
      <div class="info-grid">
        <div class="info-card">
          <div class="info-lbl">Prize Pool</div>
          <div class="info-val gold">${formatPrize(t.prizePool)}</div>
        </div>
        <div class="info-card">
          <div class="info-lbl">Entry Fee</div>
          <div class="info-val">${t.entryFee ? formatPrize(t.entryFee) : 'PERCUMA'}</div>
        </div>
        <div class="info-card">
          <div class="info-lbl">Slots</div>
          <div class="info-val ${isFull ? 'red' : 'green'}">${t.teamCount||0} / ${t.maxTeams||0}</div>
        </div>
        <div class="info-card">
          <div class="info-lbl">Format Bracket</div>
          <div class="info-val">${t.format==="double" ? "Double Elim" : "Single Elim"}</div>
        </div>
        <div class="info-card">
          <div class="info-lbl">Daftar Buka</div>
          <div class="info-val" style="font-size:12px">${formatDate(t.regOpenDate)}</div>
        </div>
        <div class="info-card">
          <div class="info-lbl">Daftar Tutup</div>
          <div class="info-val" style="font-size:12px">${formatDate(t.regCloseDate)}</div>
        </div>
        <div class="info-card">
          <div class="info-lbl">Tarikh Mula</div>
          <div class="info-val" style="font-size:12px">${formatDate(t.startDate)}</div>
        </div>
      </div>

      <!-- Application section placeholder -->
      <div id="applySection"></div>

      ${t.description ? `
      <div class="section-card">
        <div class="section-header"><div class="section-icon">📋</div><span class="section-title">Deskripsi Tournament</span></div>
        <div class="section-body"><p style="font-size:14px;color:var(--txt2);line-height:1.75;white-space:pre-wrap">${escHtml(t.description)}</p></div>
      </div>` : ""}

      <!-- Stage formats -->
      <div class="section-card">
        <div class="section-header"><div class="section-icon">🎮</div><span class="section-title">Format Perlawanan Setiap Peringkat</span></div>
        <div class="section-body">${stageFormatsHtml(t.stageFormats, t.format)}</div>
      </div>

      <!-- Prize breakdown -->
      ${(t.prizeBreakdown && (t.prizeBreakdown.first||t.prizeBreakdown.second||t.prizeBreakdown.third)) ? `
      <div class="section-card">
        <div class="section-header"><div class="section-icon">🏆</div><span class="section-title">Agihan Hadiah</span></div>
        <div class="section-body">
          ${t.prizeBreakdown.first  ? `<div class="prize-row"><div class="prize-place p1">🥇</div><div class="prize-name">Juara 1</div><div class="prize-amount">${formatPrize(t.prizeBreakdown.first)}</div></div>` : ""}
          ${t.prizeBreakdown.second ? `<div class="prize-row"><div class="prize-place p2">🥈</div><div class="prize-name">Naib Juara</div><div class="prize-amount">${formatPrize(t.prizeBreakdown.second)}</div></div>` : ""}
          ${t.prizeBreakdown.third  ? `<div class="prize-row"><div class="prize-place p3">🥉</div><div class="prize-name">Tempat 3</div><div class="prize-amount">${formatPrize(t.prizeBreakdown.third)}</div></div>` : ""}
        </div>
      </div>` : ""}

      <!-- Rules -->
      ${t.rules ? `
      <div class="section-card">
        <div class="section-header"><div class="section-icon">📜</div><span class="section-title">Peraturan & Syarat</span></div>
        <div class="section-body"><p class="rules-body">${escHtml(t.rules)}</p></div>
      </div>` : ""}

      <!-- Community link -->
      ${t.whatsappGroupId ? `
      <div class="section-card">
        <div class="section-header"><div class="section-icon">💬</div><span class="section-title">Komuniti / Kumpulan</span></div>
        <div class="section-body">
          <a href="${escHtml(t.whatsappGroupId)}" target="_blank" rel="noopener" class="btn btn-secondary">Sertai Kumpulan →</a>
        </div>
      </div>` : ""}

      <!-- Approved participants -->
      <div class="section-card">
        <div class="section-header"><div class="section-icon">👥</div><span class="section-title">Peserta Diluluskan (${approvedTeams.length})</span></div>
        <div class="section-body">
          ${approvedTeams.length
            ? `<div class="participant-grid">${approvedTeams.map(([uid]) =>
                `<div class="participant-chip">
                  <span class="participant-tag">[${escHtml(t.teams[uid]?.teamTag||"—")}]</span>
                  <span class="participant-name">${escHtml(teamNameCache[uid]||"—")}</span>
                </div>`
              ).join("")}</div>`
            : '<p style="color:var(--txt3);font-size:13px">Belum ada pasukan diluluskan.</p>'
          }
        </div>
      </div>

      <!-- Bracket -->
      <div class="section-card bracket-card">
        <div class="section-header"><div class="section-icon">📊</div><span class="section-title">Bracket</span></div>
        <div class="section-body">${bracketHtml}</div>
      </div>
      `;

      // Render apply section now that DOM exists
      renderApplySection();
      document.title = `${t.name} - MLBB OPS`;

      // ── Bracket: horizontal drag-to-pan only ────────────────
      document.querySelectorAll('.bracket-scroll').forEach(el => {
        let down = false, ox = 0, sl = 0;
        el.addEventListener('mousedown', e => {
          if (e.button !== 0) return;
          down = true; ox = e.clientX; sl = el.scrollLeft;
          el.classList.add('is-dragging');
          e.preventDefault();
        });
        document.addEventListener('mousemove', e => {
          if (!down) return;
          el.scrollLeft = sl - (e.clientX - ox);
        });
        document.addEventListener('mouseup', () => {
          if (down) { down = false; el.classList.remove('is-dragging'); }
        });
      });
    }

    render();
  </script>
  <script type="module">
    import { db } from "./js/firebase-config.js";
    import { initTournamentBanner } from "./js/tournament-banner.js";
    initTournamentBanner(db);
  </script>
  <!-- Mobile bracket accordion + hamburger drawer -->
  <script>
  (function () {
    // Mobile bracket accordion — delegated because bracket renders later
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-mbr-toggle]');
      if (btn) btn.closest('.mbr-section').classList.toggle('open');
    });

    // Hamburger drawer
    var ham = document.getElementById('navHamburger');
    var drawer = document.getElementById('navDrawer');
    var close = document.getElementById('navDrawerClose');
    var adminItems = document.querySelectorAll('.admin-nav');
    var playerItems = document.querySelectorAll('.player-nav');

    // Mirror admin/player nav visibility into drawer
    var obs = new MutationObserver(function() {
      var drawerAdmin  = drawer.querySelectorAll('.admin-nav');
      var drawerPlayer = drawer.querySelectorAll('.player-nav');
      var aHidden = adminItems[0] && adminItems[0].classList.contains('hidden');
      var pHidden = playerItems[0] && playerItems[0].classList.contains('hidden');
      drawerAdmin.forEach(function(el){ el.classList.toggle('hidden', aHidden); });
      drawerPlayer.forEach(function(el){ el.classList.toggle('hidden', pHidden); });
    });
    adminItems.forEach(function(el){ obs.observe(el, {attributes:true, attributeFilter:['class']}); });
    playerItems.forEach(function(el){ obs.observe(el, {attributes:true, attributeFilter:['class']}); });

    function openDrawer()  { drawer.classList.add('open');    ham.setAttribute('aria-expanded','true'); }
    function closeDrawer() { drawer.classList.remove('open'); ham.setAttribute('aria-expanded','false'); }
    if (ham) ham.addEventListener('click', openDrawer);
    if (close) close.addEventListener('click', closeDrawer);
    if (drawer) drawer.addEventListener('click', function(e){ if(e.target===drawer) closeDrawer(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDrawer(); });
  })();
  </script>
</body>
</html>
