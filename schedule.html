<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule - MLBB OPS</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    /* ── Page Wallpaper ─────────────────────────── */
    body {
      background-image:
        linear-gradient(
          to bottom,
          rgba(5, 3, 14, .82) 0%,
          rgba(5, 3, 14, .76) 40%,
          rgba(5, 3, 14, .88) 100%
        ),
        url('assets/Teamsetup_page_wallpaper.png');
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    .home-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: color-mix(in srgb, var(--bg) 94%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .home-nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 14px 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: nowrap;
    }
    .home-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      flex-wrap: nowrap;
      list-style: none;
      flex: 1 1 auto;
      overflow: hidden;
    }
    .home-links a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 9px 10px;
      border-radius: var(--radius);
      color: var(--txt2);
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
      transition: all .2s;
    }
    .home-links a:hover,
    .home-links a.active {
      color: var(--gold);
      background: color-mix(in srgb, var(--gold) 12%, transparent);
    }
    .home-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      justify-content: flex-end;
    }
    .nav-admin-badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 4px 10px;
      border-radius: var(--radius);
      color: var(--gold);
      background: color-mix(in srgb, var(--gold) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--gold) 30%, transparent);
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: default;
      user-select: none;
    }
    .hero {
      padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .hero h1 {
      color: var(--gold);
      letter-spacing: 2px;
    }
    .filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .tab-btn {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--txt2);
      border-radius: var(--radius);
      padding: 9px 13px;
      font-family: var(--font-head);
      letter-spacing: 1px;
      cursor: pointer;
    }
    .tab-btn.active {
      color: var(--gold);
      border-color: var(--gold);
    }
    .tab-count {
      font-family: var(--font-mono);
      color: var(--txt);
    }
    /* ── Tournament poster grid ─────────────── */
    .tournament-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    /* ── Poster card ─────────────────────────── */
    .poster-card {
      display: flex; flex-direction: column;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      text-decoration: none; color: inherit;
      transition: transform .18s, box-shadow .18s;
      cursor: pointer;
    }
    .poster-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
      border-color: color-mix(in srgb, var(--gold) 35%, transparent);
    }
    .poster-img-wrap {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: var(--bg3);
      flex-shrink: 0;
    }
    .poster-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .3s;
    }
    .poster-card:hover .poster-img { transform: scale(1.03); }
    .poster-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0d1525 0%, #1a2540 100%);
      font-family: var(--font-head); font-size: 64px;
      color: rgba(240,165,0,.18); letter-spacing: 2px;
      user-select: none;
    }
    .poster-overlay {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to bottom,
        rgba(0,0,0,.12) 0%, transparent 35%,
        transparent 55%, rgba(0,0,0,.68) 100%);
    }
    .poster-badges {
      position: absolute; top: 10px; left: 10px; right: 10px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .poster-status {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 4px 9px; border-radius: 4px;
      font-weight: 700;
    }
    .poster-status.live     { background: rgba(239,68,68,.9); color:#fff; }
    .poster-status.reg      { background: rgba(34,197,94,.85); color:#fff; }
    .poster-status.upcoming { background: rgba(99,102,241,.85); color:#fff; }
    .poster-status.done     { background: rgba(100,100,100,.8); color:#ddd; }
    .poster-category {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 4px 9px; border-radius: 4px;
      font-weight: 700;
    }
    .poster-category.marhaen { background: rgba(34,197,94,.85); color:#fff; }
    .poster-category.jaguh   { background: rgba(59,130,246,.85); color:#fff; }
    .poster-category.sultan  { background: rgba(234,179,8,.9);  color:#000; }
    .poster-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 12px 10px;
    }
    .poster-title-overlay {
      font-family: var(--font-head); font-size: 16px; font-weight: 700;
      letter-spacing: 1px; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,.7);
      line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* ── Poster card body ─────────────────── */
    .poster-body {
      padding: 12px 14px 14px;
      display: flex; flex-direction: column; gap: 10px;
      flex: 1;
    }
    .poster-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .poster-stat {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 7px 10px;
    }
    .poster-stat-lbl {
      font-family: var(--font-mono); font-size: 8px;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--txt3); display: block; margin-bottom: 2px;
    }
    .poster-stat-val {
      font-family: var(--font-head); font-size: 13px;
      font-weight: 700; color: var(--txt); display: block;
    }
    .poster-stat-val.gold { color: var(--gold); }
    .poster-stat-val.green { color: var(--green); }
    .poster-stat-val.red { color: var(--red); }
    .poster-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 8px; border-top: 1px solid var(--border);
    }
    .poster-format-lbl {
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 1px; color: var(--txt3);
    }
    .poster-cta {
      font-family: var(--font-head); font-size: 11px;
      letter-spacing: 1px; color: var(--gold);
      font-weight: 700; text-transform: uppercase;
    }
    /* ── Empty / utility ─────────────────── */
    .empty-state {
      color: var(--txt2); text-align: center; padding: 2rem;
    }
    @media (max-width: 1100px) {
      .home-nav-inner { flex-wrap: wrap; justify-content: center; gap: 8px; }
      .navbar-logo    { flex: 1 1 100%; justify-content: center; }
      .home-links     { flex-wrap: wrap; flex: 1 1 100%; overflow: visible; justify-content: center; }
      .home-actions   { justify-content: center; width: 100%; }
    }
    @media (max-width: 640px) {
      .home-nav-inner { padding: 12px 1rem; }
      .home-links a   { font-size: 12px; padding: 7px 10px; }
      .hero           { padding-top: 1.5rem; }
      .tournament-list { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }
  </style>
</head>
<body>
  <header class="home-nav">
    <div class="home-nav-inner">
      <a href="index.html" class="navbar-logo">
        <img src="assets/logo_organizer.png" alt="HC" class="logo-img">
        <span class="logo-name">Tournament <span>Organizer</span></span>
      </a>
      <ul class="home-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#tournaments">Tournaments</a></li>
        <li><a href="index.html#teams">Teams</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
        <li><a href="standing.html">Standing</a></li>
        <li><a class="active" href="schedule.html">Schedule</a></li>
        <li class="player-nav"><a href="team-setup.html">Registration</a></li>
        <li class="admin-nav hidden"><a href="organizer.html">Organizer Dashboard <span class="admin-nav-badge" style="display:none">0</span></a></li>
      </ul>
      <div class="home-actions" id="navActions" style="visibility:hidden"></div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>TOURNAMENTS</h1>
        <p class="text-muted">Semak tournament, daftar pasukan, dan ikuti perkembangan perlawanan</p>
      </div>
    </section>

    <section class="page-wrap">
      <div class="container">
        <div class="filter-tabs" id="filterTabs">
          <button class="tab-btn active" data-filter="all">Semua <span class="tab-count" id="countAll">0</span></button>
          <button class="tab-btn" data-filter="live">Live <span class="tab-count" id="countLive">0</span></button>
          <button class="tab-btn" data-filter="upcoming">Upcoming <span class="tab-count" id="countUpcoming">0</span></button>
          <button class="tab-btn" data-filter="done">Selesai <span class="tab-count" id="countDone">0</span></button>
        </div>

        <div class="tournament-list" id="tournamentList">
          <div class="card"><div class="card-body empty-state"><span class="spinner"></span></div></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import { formatDate, formatPrize } from "./js/utils.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { ref, onValue, off, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
    import { initAdminNavBadge } from "./js/admin-nav-badge.js";

    const list = document.getElementById("tournamentList");
    const tabs = document.getElementById("filterTabs");
    const tournamentsRef = ref(db, "tournaments");
    let activeFilter = "all";
    let latestTournaments = {};
    let listening = false;

    onAuthStateChanged(auth, async (user) => {
      const navActions = document.getElementById("navActions");
      const adminNavItems = document.querySelectorAll(".admin-nav");
      const playerNavItems = document.querySelectorAll(".player-nav");
      if (!user) {
        adminNavItems.forEach((node) => node.classList.add("hidden"));
        navActions.innerHTML = `
          <a class="btn btn-secondary btn-sm" href="login.html">Login</a>
          <a class="btn btn-primary btn-sm" href="register.html">Sign Up</a>
        `;
        navActions.style.visibility = "visible";
      } else {
        const roleSnap = await get(ref(db, `users/${user.uid}/role`));
        const role = roleSnap.exists() ? roleSnap.val() : "player";
        adminNavItems.forEach((node) => node.classList.toggle("hidden", role !== "organizer"));
        playerNavItems.forEach((node) => node.classList.toggle("hidden", role === "organizer"));
        if (role === "organizer") initAdminNavBadge(db);
        navActions.innerHTML = role === "organizer"
          ? '<span class="btn btn-primary btn-sm" style="cursor:default;user-select:none;pointer-events:none;">Admin</span><button class="btn btn-secondary btn-sm" id="logoutBtn">Log Keluar</button>'
          : '<span class="btn btn-primary btn-sm" style="cursor:default;user-select:none;pointer-events:none;">Player</span><button class="btn btn-secondary btn-sm" id="logoutBtn">Log Keluar</button>';
        navActions.style.visibility = "visible";
        document.getElementById("logoutBtn")?.addEventListener("click", async () => {
          await signOut(auth); window.location.href = "login.html";
        });
      }
    });

    function statusFilter(status) {
      if (status === "done") return "done";
      if (status === "live") return "live";
      return "upcoming";
    }

    function escHtml(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function renderCounts(items) {
      document.getElementById("countAll").textContent      = items.length;
      document.getElementById("countLive").textContent     = items.filter(t => t.status === "live").length;
      document.getElementById("countUpcoming").textContent = items.filter(t => statusFilter(t.status) === "upcoming").length;
      document.getElementById("countDone").textContent     = items.filter(t => t.status === "done").length;
    }

    function posterStatusBadge(status) {
      const map = {
        live:         ['live',     '🔴 LIVE'],
        registration: ['reg',      'BUKA DAFTAR'],
        upcoming:     ['upcoming', 'AKAN DATANG'],
        done:         ['done',     'SELESAI'],
      };
      const [cls, lbl] = map[status] || ['upcoming', status.toUpperCase()];
      return `<span class="poster-status ${cls}">${lbl}</span>`;
    }

    function renderTournaments() {
      const items = Object.entries(latestTournaments || {})
        .map(([id, t]) => ({ id, ...t }))
        .sort((a, b) => (b.startDate || 0) - (a.startDate || 0));
      renderCounts(items);

      const filtered = activeFilter === "all" ? items
        : items.filter(t => statusFilter(t.status) === activeFilter);

      if (!filtered.length) {
        list.innerHTML = '<div class="card"><div class="card-body empty-state">Tiada tournament untuk filter ini.</div></div>';
        return;
      }

      list.innerHTML = filtered.map(t => {
        const filled = t.teamCount || 0;
        const max    = t.maxTeams  || 0;
        const isFull = filled >= max && max > 0;
        const slotColor = isFull ? "red" : (filled / max > 0.8 ? "gold" : "green");
        const isReg = t.status === "registration";
        const regDeadline = t.regCloseDate
          ? formatDate(t.regCloseDate)
          : "—";
        const imgTag = t.posterUrl
          ? `<img class="poster-img" src="${escHtml(t.posterUrl)}" alt="${escHtml(t.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=poster-placeholder>${escHtml(t.name[0]||'?')}</div>'">`
          : `<div class="poster-placeholder">${escHtml((t.name||'?')[0])}</div>`;

        return `
        <a class="poster-card fade-in" href="tournament-details.html?id=${t.id}">
          <div class="poster-img-wrap">
            ${imgTag}
            <div class="poster-overlay"></div>
            <div class="poster-badges">
              ${posterStatusBadge(t.status)}
              <span class="poster-category ${t.category}">${(t.category||'').toUpperCase()}</span>
            </div>
            <div class="poster-bottom">
              <div class="poster-title-overlay">${escHtml(t.name)}</div>
            </div>
          </div>
          <div class="poster-body">
            <div class="poster-stats">
              <div class="poster-stat">
                <span class="poster-stat-lbl">Prize Pool</span>
                <span class="poster-stat-val gold">${formatPrize(t.prizePool)}</span>
              </div>
              <div class="poster-stat">
                <span class="poster-stat-lbl">Entry Fee</span>
                <span class="poster-stat-val">${t.entryFee ? formatPrize(t.entryFee) : 'PERCUMA'}</span>
              </div>
              <div class="poster-stat">
                <span class="poster-stat-lbl">Slots</span>
                <span class="poster-stat-val ${slotColor}">${isFull ? 'PENUH' : `${filled} / ${max}`}</span>
              </div>
              <div class="poster-stat">
                <span class="poster-stat-lbl">Daftar Tutup</span>
                <span class="poster-stat-val" style="font-size:11px">${regDeadline}</span>
              </div>
            </div>
            <div class="poster-footer">
              <span class="poster-format-lbl">${t.format === 'double' ? 'Double Elim' : 'Single Elim'}</span>
              <span class="poster-cta">Lihat Details →</span>
            </div>
          </div>
        </a>`;
      }).join("");
    }

    async function tournamentsHandler(snapshot) {
      latestTournaments = snapshot.val() || {};
      renderTournaments();
    }

    function startListener() {
      if (listening) return;
      listening = true;
      onValue(tournamentsRef, tournamentsHandler);
    }

    function stopListener() {
      if (!listening) return;
      off(tournamentsRef, "value", tournamentsHandler);
      listening = false;
    }

    tabs.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-filter]");
      if (!btn) return;
      activeFilter = btn.dataset.filter;
      tabs.querySelectorAll(".tab-btn").forEach((node) => node.classList.toggle("active", node === btn));
      renderTournaments();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopListener();
      else startListener();
    });
    window.addEventListener("beforeunload", stopListener);
    startListener();
  </script>
</body>
</html>
